dist:
  name: otelcol
  description: Reproduction demo for OTLP exporter nil pointer dereference
  output_path: ./otelcol-dev

receivers:
  - gomod: "go.opentelemetry.io/collector/receiver/otlpreceiver v0.146.1"
  - gomod: "github.com/open-telemetry/opentelemetry-collector-contrib/receiver/filelogreceiver v0.146.0"
  - gomod: "github.com/open-telemetry/opentelemetry-collector-contrib/receiver/journaldreceiver v0.146.0"
  # Our custom receiver that sends data immediately on Start()
  - gomod: github.com/mactavishz/otel-collector-panic-reproduction v1.0.0
    import: github.com/mactavishz/otel-collector-panic-reproduction/immediatereceiver
    path: .

processors:
  - gomod: "go.opentelemetry.io/collector/processor/batchprocessor v0.146.1"
  - gomod: "github.com/open-telemetry/opentelemetry-collector-contrib/processor/attributesprocessor v0.146.0"
  - gomod: "github.com/open-telemetry/opentelemetry-collector-contrib/processor/resourceprocessor v0.146.0"
  - gomod: "github.com/open-telemetry/opentelemetry-collector-contrib/processor/k8sattributesprocessor v0.146.0"
  - gomod: "github.com/open-telemetry/opentelemetry-collector-contrib/processor/transformprocessor v0.146.0"
  - gomod: "github.com/open-telemetry/opentelemetry-collector-contrib/processor/filterprocessor v0.146.0"
  - gomod: "go.opentelemetry.io/collector/processor/memorylimiterprocessor v0.146.1"

exporters:
  - gomod: "go.opentelemetry.io/collector/exporter/debugexporter v0.146.1"
  - gomod: "go.opentelemetry.io/collector/exporter/nopexporter v0.146.1"
  - gomod: "go.opentelemetry.io/collector/exporter/otlpexporter v0.146.1"
  - gomod: "go.opentelemetry.io/collector/exporter/otlphttpexporter v0.146.1"
  # Slow OTLP exporter wrapper for race condition reproduction
  - gomod: github.com/mactavishz/otel-collector-panic-reproduction v1.0.0
    import: github.com/mactavishz/otel-collector-panic-reproduction/slowotlpexporter
    path: .

extensions:
  - gomod: "github.com/open-telemetry/opentelemetry-collector-contrib/extension/healthcheckextension v0.146.0"
  - gomod: "github.com/open-telemetry/opentelemetry-collector-contrib/extension/storage/filestorage v0.146.0"
